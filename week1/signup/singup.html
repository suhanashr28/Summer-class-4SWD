<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <title>Registration</title>
  </head>

  <body>
    <div class="container">
      <h1 class="title">User Registration</h1>

      <form id="registerForm">
        <div class="box">
          <h2 class="section-title">Personal Details</h2>

          <div class="form-group">
            <label>First Name</label>
            <input type="text" />
          </div>

          <div class="form-group">
            <label>Last Name</label>
            <input type="text" />
          </div>

          <div class="form-group">
            <label>Age</label>
            <input type="number" />
          </div>

          <div class="form-group">
            <label>Gender</label>
            <select>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>

          <div class="form-group">
            <label>Profile Picture</label>
            <input type="file" />
          </div>
        </div>
        <div class="box">
          <h2 class="section-title">Account Details</h2>

          <div class="form-group">
            <label>Email</label>
            <input type="email" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" />
          </div>

          <div class="form-group role-group">
            <label>Role:</label>

            <label> <input type="radio" name="role" /> Admin </label>

            <label> <input type="radio" name="role" /> User </label>
          </div>

          <div class="form-group">
            <label>
              <input type="checkbox" /> I agree with terms and conditions
            </label>
          </div>
        </div>
        <div class="btn-group">
          <button type="submit" class="btn submit">Register</button>
          <button type="reset" class="btn reset">Reset</button>
        </div>
      </form>

      <footer class="footer">© 2026 My TodoList. All rights reserved.</footer>
    </div>
  </body>
</html>
