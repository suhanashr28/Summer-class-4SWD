<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration</title>
  </head>
  <body>
    <h1>User Registration</h1>
    <h2>Personal Details</h2>

    <form>
      <div>
        <label>First Name:</label>
        <input type="text" />
      </div>

      <div>
        <label>Last Name:</label>
        <input type="text" />
      </div>

      <div>
        <label>Age:</label>
        <input type="number" />
      </div>

      <div>
        <label>Gender:</label>
        <select>
          <option selected>Male</option>
          <option>Female</option>
          <option>Other</option>
        </select>
      </div>

      <div>
        <label>Profile Picture:</label>
        <input type="file" />
      </div>

      <h2>Account Details</h2>

      <div>
        <label>Email:</label>
        <input type="email" />
      </div>

      <div>
        <label>Password:</label>
        <input type="password" />
      </div>

      <div>
        <label>Role:</label>
        <label>Admin</label>
        <input type="radio" name="role" />

        <label>User</label>
        <input type="radio" name="role" />
      </div>

      <div>
        <input type="checkbox" />
        I agree with the terms and conditions
      </div>

      <div>
        <button type="submit">Register</button>
        <button type="reset">Reset</button>
      </div>
    </form>

    <footer>© 2026 My TodoList. All rights reserved.</footer>
  </body>
</html>
